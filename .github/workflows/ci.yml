name: CI Pipeline

on:
  # Esegue la pipeline su push al branch principale
  push:
    branches:
      - baseline
      - main
  # Esegue la pipeline su pull request verso il branch principale
  pull_request:
    branches:
      - baseline
      - main

jobs:
  build-test-quality:
    # Ambiente di esecuzione richiesto
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Java 21 (Temurin)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3) Cache delle dipendenze Maven (~/.m2)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      # 4) Build del modulo applicativo (scope esplicito su app)
      - name: Build app module
        run: mvn -B -pl app -am clean compile

      # 5) Esecuzione test del solo sottosistema commenti
      - name: Run scoped comment subsystem tests
        run: >
          mvn -B -pl app -am test
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest="org.apache.roller.weblogger.moderation.ModerationDecisionTest,
          org.apache.roller.weblogger.moderation.KeywordModerationPolicyTest,
          org.apache.roller.weblogger.moderation.RateLimitModerationPolicyTest,
          org.apache.roller.weblogger.moderation.CommentModerationServiceTest,
          org.apache.roller.weblogger.pojos.CommentSearchCriteriaTest,
          org.apache.roller.weblogger.pojos.WeblogEntryCommentTest,
          org.apache.roller.weblogger.ui.rendering.plugins.comments.CommentValidatorTest"

      # 6) Generazione report code coverage (JaCoCo)
      - name: Generate JaCoCo report
        run: mvn -B -pl app -am org.jacoco:jacoco-maven-plugin:report -Dsurefire.failIfNoSpecifiedTests=false

      # 7) Mutation testing con PiTest
      - name: Run PiTest mutation coverage
        run: mvn -B -pl app org.pitest:pitest-maven:mutationCoverage

      # 8) Snyk: dependency vulnerability scan
      #    continue-on-error=true perché Apache Roller legacy può contenere CVE
      #    non afferenti al sottosistema sviluppato; lo step produce comunque output
      #    utile per la relazione senza bloccare l'intera pipeline.
      - name: Snyk dependency vulnerability scan
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=app/pom.xml --severity-threshold=high

      # 9) SonarCloud: analisi qualità + coverage
      - name: SonarCloud analysis
        working-directory: app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # Upload artifact report JaCoCo
      - name: Upload JaCoCo report artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            app/target/site/jacoco
          if-no-files-found: warn

      # Upload artifact report PiTest
      - name: Upload PiTest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pitest-report
          path: |
            app/target/pit-reports
          if-no-files-found: warn
