version: "3.9"

services:
  postgresql:
    image: postgres:15
    container_name: roller-postgres
    environment:
      POSTGRES_DB: rollerdb
      POSTGRES_USER: scott
      POSTGRES_PASSWORD: tiger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  roller:
    image: roller-comment-moderation:latest
    container_name: roller-app
    depends_on:
      - postgresql
    ports:
      - "8080:8080"
    environment:
      STORAGE_ROOT: /usr/local/roller/data
      DATABASE_JDBC_DRIVERCLASS: org.postgresql.Driver
      DATABASE_JDBC_CONNECTIONURL: jdbc:postgresql://postgresql:5432/rollerdb
      DATABASE_JDBC_USERNAME: scott
      DATABASE_JDBC_PASSWORD: tiger
      DATABASE_HOST: postgresql:5432

volumes:
  postgres_data: